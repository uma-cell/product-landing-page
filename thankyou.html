<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <link rel="stylesheet" href="style.css"> <!-- landing page styles reuse -->
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f8f9fa;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }
    .thankyou-container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .thankyou-container h1 {
      color: #0077ff;
      margin-bottom: 20px;
    }
    .thankyou-container p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .thankyou-container a {
      text-decoration: none;
      background: #0077ff;
      color: #fff;
      padding: 12px 25px;
      border-radius: 30px;
      transition: 0.3s;
    }
    .thankyou-container a:hover {
      background: #005ecc;
    }
  </style>
</head>
<body>
  <div class="thankyou-container">
    <h1>Thanks for buying! 🎉</h1>
    <p>Your order is confirmed.</p>
    <a href="landing.html">Go Back to Home</a>
  </div>
</body>
</html>
